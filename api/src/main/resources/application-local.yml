spring:
  config:
    activate:
      on-profile: local

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://dev-csf1pz6vkgyyinsz.us.auth0.com/

  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # schema-first: keep Hibernate in validate mode to avoid accidental schema drift (ex: CREATE TYPE for enums).
      # If you really need it, override with SPRING_JPA_HIBERNATE_DDL_AUTO=update.
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

app:
  cors:
    allowed-origins: "http://localhost:4201,https://allauch-basketball-simulator.onrender.com"
auth0:
  audience: https://allauch-simulator-backend/

logging:
  level:
    org.springframework.security: DEBUG
