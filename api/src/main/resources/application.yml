server:
  port: ${PORT:8080}

app:
  cors:
    allowed-origins: "http://localhost:4201,https://allauch-basketball-simulator.onrender.com"

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH0_ISSUER_URI:}

  datasource:
    url: ${SPRING_DATASOURCE_URL:}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # schema-first: Hibernate must not mutate the DB schema at runtime.
      # Override with SPRING_JPA_HIBERNATE_DDL_AUTO=update only for local experiments.
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: ${SPRING_JPA_SHOW_SQL:true}

auth0:
  audience: ${AUTH0_AUDIENCE:}

logging:
  level:
    org.springframework.security: ${LOG_LEVEL_SPRING_SECURITY:INFO}
